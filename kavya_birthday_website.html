<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Kavya 💙</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  color: white;
}

.container {
  padding: 30px;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #1e90ff;
  color: white;
  cursor: pointer;
  margin-top: 20px;
}
button:hover {
  background: #187bcd;
}

.hidden {
  display: none;
}

h1 {
  font-size: 3em;
}

.cake {
  font-size: 80px;
}

.message {
  font-size: 1.5em;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <button onclick="openSurprise()">🎁 Click to Open Your Surprise</button>

  <div id="step1" class="hidden">
    <h1>🎂 Happy Birthday Kavya 💙</h1>
  </div>

  <div id="step2" class="hidden">
    <div class="cake">🎂🕯️</div>
    <button onclick="blowCandle()">🕯️ Blow Candle</button>
  </div>

  <div id="step3" class="hidden">
    <div class="cake">🎂</div>
    <button onclick="cutCake()">🔪 Cut Cake</button>
  </div>

  <div id="final" class="hidden message">
    💙 Happy Birthday dear sister Kavya! 💙<br><br>
    You are my strength, my happiness, and my forever friend.<br>
    Wishing you endless joy, success, and love in life.<br><br>
    🎉 Best wishes from your brother 🎉
  </div>

</div>

<script>

function openSurprise() {
  document.getElementById("step1").style.display = "block";
  setTimeout(() => {
    document.getElementById("step2").style.display = "block";
  }, 1500);
}

function blowCandle() {
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}

function cutCake() {
  document.getElementById("step3").style.display = "none";
  document.getElementById("final").style.display = "block";
}

</script>

</body>
</html>
